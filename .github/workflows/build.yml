name: Build Woodcutter Mod

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Forge workspace
        run: |
          mkdir -p /home/runner/forge-workspace
          cd /home/runner/forge-workspace
          wget -q https://maven.minecraftforge.net/net/minecraftforge/forge/1.20.1-47.2.0/forge-1.20.1-47.2.0-mdk.zip -O mdk.zip
          unzip -o -q mdk.zip
          rm mdk.zip
          cp -r $GITHUB_WORKSPACE/src .
          cp $GITHUB_WORKSPACE/build.gradle .
          cp $GITHUB_WORKSPACE/gradle.properties .
          cp $GITHUB_WORKSPACE/settings.gradle .
          chmod +x gradlew

      - name: Build
        working-directory: /home/runner/forge-workspace
        run: ./gradlew build --no-daemon

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: woodcuttermod-jar
          path: /home/runner/forge-workspace/build/libs/woodcuttermod-*.jar
          if-no-files-found: warn
