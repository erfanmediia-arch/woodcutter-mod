name: Build Woodcutter Mod

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Forge MDK
        run: |
          wget -q https://maven.minecraftforge.net/net/minecraftforge/forge/1.20.1-47.2.0/forge-1.20.1-47.2.0-mdk.zip -O forge-mdk.zip
          unzip -o -q forge-mdk.zip
          rm forge-mdk.zip

      - name: Copy mod files into MDK
        run: |
          cp -r src/main/java/com/woodcutter src/main/java/com/
          cp -r src/main/resources/META-INF/mods.toml src/main/resources/META-INF/
          cp build.gradle build.gradle
          cp gradle.properties gradle.properties

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build mod JAR
        run: ./gradlew build --no-daemon

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: woodcuttermod-jar
          path: build/libs/woodcuttermod-*.jar
          if-no-files-found: warn
